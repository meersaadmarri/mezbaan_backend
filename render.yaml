# Render.com — free tier (web service + PostgreSQL). Import this file when creating a Blueprint.
# Note: switch DB_CONNECTION to pgsql and use Render Postgres env vars.
services:
  - type: web
    name: mezban-api
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: pgsql
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: public
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: mezban-db
          property: connectionString

databases:
  - name: mezban-db
    plan: free
    databaseName: mezban
    user: mezban
