; Loaded last via PHP_INI_SCAN_DIR (appended by scripts/serve-mobile.sh) so it wins over system defaults.
; The `php -S` child from `php artisan serve` does not inherit parent `php -d` flags.
upload_max_filesize = 1024M
post_max_size = 1024M
max_file_uploads = 80
max_execution_time = 0
max_input_time = 600
